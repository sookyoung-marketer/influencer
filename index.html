<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>경리나라 인플루언서</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0F172A;
  --ink2:   #334155;
  --ink3:   #64748B;
  --ink4:   #94A3B8;
  --paper:  #FFFFFF;
  --paper2: #F8FAFC;
  --paper3: #F1F5F9;
  --line:   #E2E8F0;
  --line2:  #CBD5E1;

  --blue:   #2563EB;  --blue-l: #EFF6FF;  --blue-d: #1D4ED8;
  --green:  #059669;  --green-l:#ECFDF5;
  --amber:  #D97706;  --amber-l:#FFFBEB;
  --red:    #E05252;  --red-l:  #FFF5F5;
  --purple: #7C3AED;  --purple-l:#F5F3FF;
  --teal:   #0D9488;  --teal-l: #F0FDFA;

  --nv-bg: #DBEAFE; --nv-c: #1E40AF;
  --ts-bg: #EDE9FE; --ts-c: #4C1D95;

  --r-sm: 4px; --r: 8px; --r-lg: 12px; --r-xl: 16px;
  --sh: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --sh-md: 0 4px 12px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
  --sh-lg: 0 10px 32px rgba(0,0,0,.12);
  --tr: 150ms ease;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Pretendard',sans-serif; background:var(--paper2); color:var(--ink); font-size:13px; line-height:1.5; }
a { color:var(--blue); text-decoration:none; }
button,input,select,textarea { font-family:inherit; font-size:13px; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--line2); border-radius:3px; }

.hd {
  background:var(--ink);
  padding:0 20px;
  height:52px;
  display:flex;
  align-items:center;
  gap:0;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:var(--sh-md);
}
.logo { display:flex; align-items:center; gap:10px; margin-right:20px; text-decoration:none; }
.logo-mark { width:28px; height:28px; background:var(--blue); border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff; }
.logo-text { font-size:13px; font-weight:600; color:#F1F5F9; letter-spacing:-.3px; }
.nav { display:flex; gap:2px; flex:1; }
.nav-btn { padding:6px 14px; border-radius:var(--r-sm); color:#94A3B8; font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; transition:var(--tr); white-space:nowrap; }
.nav-btn:hover { background:rgba(255,255,255,.08); color:#F1F5F9; }
.nav-btn.on { background:var(--blue); color:#fff; }
.nav-btn.bl-tab { color:#FDA4AF; }
.nav-btn.bl-tab.on { background:var(--red); color:#fff; }
.hd-actions { margin-left:auto; display:flex; align-items:center; gap:8px; }
.btn-add { padding:6px 14px; border-radius:var(--r); background:var(--blue); color:#fff; border:none; font-size:12px; font-weight:600; cursor:pointer; transition:var(--tr); display:flex; align-items:center; gap:6px; }
.btn-add:hover { background:var(--blue-d); }

.main { padding:20px; max-width:1600px; margin:0 auto; }
.panel { display:none; }
.panel.on { display:block; }

/* ── 대시보드 ── */
.dash-stat-box { text-align:center; padding:8px 14px; background:rgba(255,255,255,.05); border-radius:8px; border:1px solid #334155; min-width:72px; }
.dash-stat-box .dsv { font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; color:#94A3B8; }
.dash-stat-box .dsl { font-size:10px; color:#64748B; margin-top:2px; }
.dash-stat-box.v-green .dsv { color:#34D399; }
.dash-stat-box.v-amber .dsv { color:#FCD34D; }
.dash-stat-box.v-red   .dsv { color:#F87171; }
.dash-urgent-row { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; border:1px solid; }
.dash-week-card { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; border:1px solid var(--line); background:var(--paper2); cursor:pointer; transition:background .15s; }
.dash-week-card:hover { background:var(--blue-l); }
.dash-week-card.overdue { border-color:#FECACA; background:#FFF5F5; }
.dash-week-card.today   { border-color:#FCA5A5; background:var(--red-l); }
.dash-week-card.soon    { border-color:#FDE68A; background:var(--amber-l); }
.dash-dl-date { min-width:46px; text-align:center; padding:5px 6px; border-radius:6px; background:var(--paper); border:1px solid var(--line2); font-family:'JetBrains Mono',monospace; }
.dash-dl-date .dd { font-size:16px; font-weight:700; line-height:1; }
.dash-dl-date .dm { font-size:9px; color:var(--ink3); margin-top:2px; }
.overdue .dash-dl-date { background:var(--red-l); border-color:#FECACA; }
.overdue .dash-dl-date .dd { color:var(--red); }
.today .dash-dl-date { background:var(--red); border-color:var(--red); }
.today .dash-dl-date .dd, .today .dash-dl-date .dm { color:#fff; }
.soon .dash-dl-date { background:var(--amber-l); border-color:#FDE68A; }
.soon .dash-dl-date .dd { color:var(--amber); }
.dash-tl-card { border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--paper); cursor:pointer; transition:box-shadow .15s; }
.dash-tl-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); }
.dash-tl-card.urgent-card { border-color:#FCA5A5; }
.dash-tl-card.done-card { opacity:.65; }
.dash-tl-head { padding:9px 13px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:7px; }
.dash-tl-head.urgent-head { background:var(--red-l); }
.dash-tl-head.done-head { background:var(--purple-l); }
.dash-tl-nick { font-weight:700; font-size:12px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dash-tl-steps { padding:8px 13px; }
.dash-tl-step { display:flex; align-items:center; gap:7px; padding:3px 0; font-size:11px; }
.dash-tl-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--line2); display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; flex-shrink:0; }
.dash-tl-dot.done    { background:var(--green); border-color:var(--green); color:#fff; }
.dash-tl-dot.current { background:var(--blue);  border-color:var(--blue);  color:#fff; box-shadow:0 0 0 2px rgba(37,99,235,.2); }
.dash-tl-dot.pending { background:var(--paper3); border-color:var(--line2); }
.dash-tl-sname { flex:1; color:var(--ink2); }
.dash-tl-sname.current { font-weight:700; color:var(--ink); }
.dash-tl-sname.pending { color:var(--ink4); }
.dash-tl-sdate { font-size:10px; color:var(--ink4); font-family:'JetBrains Mono',monospace; }
.dash-tl-sdate.near { color:var(--amber); font-weight:600; }
.dash-tl-sdate.over { color:var(--red); font-weight:600; }
.dash-tl-foot { padding:7px 13px; border-top:1px solid var(--line); background:var(--paper2); display:flex; align-items:center; justify-content:space-between; }
.inline-url { padding:4px 8px; border:1px solid transparent; border-radius:4px; background:transparent; font-size:11px; color:var(--ink); width:100%; cursor:text; font-family:inherit; }
.inline-url::placeholder { color:var(--ink4); }
.inline-url:hover { border-color:var(--line2); background:var(--paper2); }
.inline-url:focus { border-color:var(--blue); background:var(--paper); outline:none; box-shadow:0 0 0 2px rgba(37,99,235,.1); }

/* ── 3탭 상세 패널 ── */
.sp-rd-tab { flex:1; padding:10px 6px; text-align:center; font-size:11px; font-weight:600; color:var(--ink3); border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; }
.sp-rd-tab:hover { color:var(--ink); background:var(--paper3); }
.sp-rd-tab.on { color:var(--blue); border-bottom-color:var(--blue); background:var(--paper); }
.sp-rd-section { padding:14px 18px; border-bottom:1px solid var(--line); }
.sp-rd-section:last-child { border-bottom:none; }
.sp-rd-sec-title { font-size:10px; font-weight:700; color:var(--ink4); text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.sp-rd-sec-title::after { content:''; flex:1; height:1px; background:var(--line); }
.sp-rd-2col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.sp-rd-field { margin-bottom:8px; }
.sp-rd-field:last-child { margin-bottom:0; }
.sp-rd-label { display:block; font-size:10px; font-weight:600; color:var(--ink4); margin-bottom:4px; }
.sp-rd-input { width:100%; padding:7px 10px; border:1px solid var(--line2); border-radius:7px; background:var(--paper); color:var(--ink); font-size:12px; outline:none; transition:border-color .15s; font-family:inherit; }
.sp-rd-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.sp-rd-select { width:100%; padding:7px 10px; border:1px solid var(--line2); border-radius:7px; background:var(--paper); color:var(--ink); font-size:12px; cursor:pointer; outline:none; }
.sp-rd-select:focus { border-color:var(--blue); }

.stat-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
.stat-card { background:var(--paper); border:1px solid var(--line); border-radius:var(--r-lg); padding:14px 16px; box-shadow:var(--sh); }
.stat-label { font-size:10px; font-weight:600; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.stat-value { font-size:24px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--ink); }
.stat-value.v-red { color:var(--red); }
.stat-value.v-green { color:var(--green); }
.stat-value.v-amber { color:var(--amber); }

.toolbar { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.filter-group { display:flex; gap:4px; flex-wrap:wrap; }
.f-btn { padding:4px 12px; border-radius:20px; border:1px solid var(--line); background:var(--paper); color:var(--ink3); font-size:11px; font-weight:500; cursor:pointer; transition:var(--tr); white-space:nowrap; }
.f-btn:hover { background:var(--paper3); }
.f-btn.on { border-color:transparent; }
.f-all.on   { background:var(--ink);  color:#fff; }
.f-nv.on    { background:var(--nv-bg); color:var(--nv-c); border-color:#BFDBFE; }
.f-ts.on    { background:var(--ts-bg); color:var(--ts-c); border-color:#DDD6FE; }
.f-bl.on    { background:var(--red-l); color:var(--red); border-color:#FECACA; }
.f-ok.on    { background:var(--green-l); color:var(--green); border-color:#A7F3D0; }
.f-s-contact.on  { background:#F0F9FF; color:#0C4A6E; border-color:#BAE6FD; }
.f-s-wait.on     { background:var(--amber-l); color:var(--amber); border-color:#FDE68A; }
.f-s-confirm.on  { background:var(--green-l); color:var(--green); border-color:#A7F3D0; }
.f-s-guide.on    { background:var(--blue-l); color:var(--blue); border-color:#BFDBFE; }
.f-s-post.on     { background:#ECFDF5; color:#064E3B; border-color:#6EE7B7; }
.f-s-ship.on     { background:#FFF7ED; color:#7C2D12; border-color:#FED7AA; }
.f-s-done.on     { background:var(--purple-l); color:var(--purple); border-color:#DDD6FE; }
.f-s-reject.on   { background:var(--red-l); color:var(--red); border-color:#FECACA; }
.vsep { width:1px; height:20px; background:var(--line); margin:0 2px; }
.ml { margin-left:auto; }
.search-input { padding:6px 12px; border:1px solid var(--line2); border-radius:var(--r); background:var(--paper); color:var(--ink); font-size:12px; outline:none; min-width:200px; transition:var(--tr); }
.search-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.cycle-sel { padding:5px 10px; border:1px solid var(--line2); border-radius:var(--r); background:var(--paper); color:var(--ink); font-size:12px; cursor:pointer; outline:none; }

.card { background:var(--paper); border:1px solid var(--line); border-radius:var(--r-xl); overflow:hidden; box-shadow:var(--sh); }
.card-header { padding:12px 18px; border-bottom:1px solid var(--line); background:var(--paper2); display:flex; align-items:center; justify-content:space-between; gap:10px; }
.card-title { font-size:13px; font-weight:600; }
.card-count { font-size:11px; color:var(--ink3); }
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }
thead th { background:var(--ink); color:#94A3B8; font-weight:500; font-size:10px; padding:9px 12px; text-align:left; white-space:nowrap; border-bottom:1px solid #1E293B; letter-spacing:.5px; text-transform:uppercase; }
tbody tr { border-bottom:1px solid var(--line); cursor:pointer; transition:background var(--tr); }
tbody tr:hover { background:var(--blue-l); }
tbody tr:last-child { border-bottom:none; }
tbody tr.bl-row { background:#FFF8F8; }
tbody tr.bl-row:hover { background:#FFF0F0; }
td { padding:9px 12px; vertical-align:middle; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink2); }
td.mono { font-family:'JetBrains Mono',monospace; font-size:11px; }
td strong { color:var(--ink); font-weight:600; }
.empty-row td { text-align:center; padding:40px; color:var(--ink4); }

.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; white-space:nowrap; }
.b-nv     { background:var(--nv-bg); color:var(--nv-c); }
.b-ts     { background:var(--ts-bg); color:var(--ts-c); }
.b-bl     { background:var(--red-l); color:var(--red); border:1px solid #FECACA; }
.b-contact{ background:#F0F9FF; color:#0369A1; }
.b-wait   { background:var(--amber-l); color:var(--amber); }
.b-confirm{ background:var(--green-l); color:#065F46; }
.b-guide  { background:var(--blue-l); color:var(--blue); }
.b-post   { background:#ECFDF5; color:#064E3B; }
.b-ship   { background:#FFF7ED; color:#7C2D12; }
.b-done   { background:var(--purple-l); color:var(--purple); }
.b-reject { background:var(--red-l); color:var(--red); }
.b-black  { background:#FFF0F0; color:#991B1B; border:1px solid #FECACA; }

.btn-p { padding:6px 14px; border-radius:var(--r); background:var(--blue); color:#fff; border:none; font-size:12px; font-weight:600; cursor:pointer; transition:var(--tr); }
.btn-p:hover { background:var(--blue-d); }
.btn-p:disabled { opacity:.5; cursor:not-allowed; }
.btn-s { padding:6px 14px; border-radius:var(--r); background:var(--paper); color:var(--ink2); border:1px solid var(--line2); font-size:12px; cursor:pointer; transition:var(--tr); }
.btn-s:hover { background:var(--paper3); }
.btn-sm { padding:3px 9px; border-radius:var(--r-sm); background:var(--paper); color:var(--ink3); border:1px solid var(--line); font-size:11px; cursor:pointer; transition:var(--tr); }
.btn-sm:hover { background:var(--paper3); }
.btn-red { padding:3px 9px; border-radius:var(--r-sm); background:var(--red-l); color:var(--red); border:1px solid #FECACA; font-size:11px; cursor:pointer; transition:var(--tr); }
.btn-red:hover { background:#FEE2E2; }
.btn-green { padding:4px 10px; border-radius:var(--r-sm); background:var(--green-l); color:var(--green); border:1px solid #A7F3D0; font-size:11px; font-weight:600; cursor:pointer; }
.btn-row { display:flex; gap:8px; margin-top:16px; }
.btn-row .btn-p { flex:1; }
.qs { padding:3px 7px; border:1px solid var(--line); border-radius:var(--r-sm); font-size:11px; background:var(--paper); color:var(--ink); cursor:pointer; outline:none; }
.qs:focus { border-color:var(--blue); }

.overlay { position:fixed; inset:0; background:rgba(15,23,42,.4); z-index:200; display:none; justify-content:flex-end; backdrop-filter:blur(2px); }
.overlay.open { display:flex; }
.side-panel { width:500px; max-width:100vw; height:100vh; background:var(--paper); overflow:hidden; box-shadow:var(--sh-lg); display:flex; flex-direction:column; }
.sp-head { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; background:var(--paper); z-index:10; }
.sp-title { font-size:15px; font-weight:700; }
.sp-close { width:30px; height:30px; border:1px solid var(--line); border-radius:var(--r); background:var(--paper2); color:var(--ink3); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:var(--tr); }
.sp-close:hover { background:var(--paper3); }
.sp-body { flex:1; overflow-y:auto; display:flex; flex-direction:column; }

.fg { margin-bottom:14px; }
.fl { display:block; font-size:11px; font-weight:600; color:var(--ink3); margin-bottom:5px; }
.fl .req { color:var(--red); margin-left:2px; }
.fc { width:100%; padding:8px 11px; border:1px solid var(--line2); border-radius:var(--r); background:var(--paper); color:var(--ink); font-size:12px; outline:none; transition:var(--tr); }
.fc:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.fc:read-only { background:var(--paper3); color:var(--ink3); }
textarea.fc { resize:vertical; min-height:80px; line-height:1.6; }
select.fc { cursor:pointer; }
.fr2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fr3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

.plat-group { display:flex; gap:8px; }
.plat-btn { flex:1; padding:8px; border:1px solid var(--line2); border-radius:var(--r); background:var(--paper); color:var(--ink3); font-size:12px; cursor:pointer; text-align:center; font-weight:500; transition:var(--tr); }
.plat-btn.nv { background:var(--nv-bg); color:var(--nv-c); border-color:#BFDBFE; }
.plat-btn.ts { background:var(--ts-bg); color:var(--ts-c); border-color:#DDD6FE; }

.info-box { background:var(--paper2); border:1px solid var(--line); border-radius:var(--r-lg); padding:14px; margin-bottom:14px; }
.info-box.warn { background:var(--amber-l); border-color:#FDE68A; }
.info-box.danger { background:var(--red-l); border-color:#FECACA; }
.info-box .inf-name { font-size:14px; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:12px; }
.info-grid>div>span { color:var(--ink4); display:block; font-size:10px; margin-bottom:1px; }
.hist-item { border-left:2px solid var(--line2); padding:8px 12px; margin-bottom:8px; border-radius:0 var(--r) var(--r) 0; background:var(--paper2); font-size:12px; }
.hist-item.bl { border-color:var(--red); background:var(--red-l); }

.divider { border:none; border-top:1px solid var(--line); margin:16px 0; }
.sec-title { font-size:11px; font-weight:700; color:var(--ink3); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
.memo-box { background:#FAFAF7; border:1px solid #E8E4D4; border-radius:var(--r); padding:10px 12px; font-size:12px; color:var(--ink2); white-space:pre-wrap; line-height:1.6; margin-top:4px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px; margin-bottom:12px; }
.detail-grid>div>span { color:var(--ink4); display:block; font-size:10px; margin-bottom:2px; }

.status-steps { display:flex; gap:0; background:var(--paper2); border:1px solid var(--line); border-radius:var(--r-lg); padding:12px; margin-bottom:16px; overflow-x:auto; }
.step { display:flex; flex-direction:column; align-items:center; flex:1; min-width:64px; position:relative; }
.step:not(:last-child)::after { content:''; position:absolute; top:14px; right:-50%; width:100%; height:1px; background:var(--line); z-index:0; }
.step-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--line); background:var(--paper); z-index:1; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; transition:var(--tr); }
.step.done .step-dot { background:var(--green); border-color:var(--green); color:#fff; }
.step.current .step-dot { background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 0 0 3px rgba(37,99,235,.2); }
.step-label { font-size:9px; color:var(--ink4); margin-top:4px; text-align:center; }
.step.done .step-label, .step.current .step-label { color:var(--ink2); font-weight:600; }

.toast-c { position:fixed; bottom:20px; right:20px; z-index:300; display:flex; flex-direction:column; gap:6px; }
.toast { background:var(--paper); border:1px solid var(--line); padding:10px 16px; border-radius:var(--r-lg); font-size:12px; box-shadow:var(--sh-md); display:flex; align-items:center; gap:8px; max-width:320px; animation:slideIn .2s ease; }
.toast.ok  { border-color:var(--green); color:#065F46; background:var(--green-l); }
.toast.err { border-color:var(--red);   color:var(--red); background:var(--red-l); }

<script>
// ════════════════════════════════════════════════════
// ★ 여기에 Apps Script 배포 URL을 붙여넣으세요 ★
// ════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUJeJ1xjSSsyWiws0xS_7yIvfA9XDuFegDuZ8RdTULc5OKxewTKpXpumItOh7ifMboaA/exec';

// GET 래퍼
async function apiGet(action) {
  const res = await fetch(`${SCRIPT_URL}?action=${action}`);
  return res.json();
}

// POST 래퍼
async function apiPost(payload) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  });
  return res.json();
}

// ── 상수 ──────────────────────────────────────────
const STATUSES = ['컨택완료','답변대기','진행확정','가이드발송','포스팅완료','발송대기','발송완료','거절','블랙리스트'];
const STATUS_BADGE = {
  '컨택완료':'b-contact', '답변대기':'b-wait', '진행확정':'b-confirm',
  '가이드발송':'b-guide', '포스팅완료':'b-post', '발송대기':'b-ship',
  '발송완료':'b-done', '거절':'b-reject', '블랙리스트':'b-black'
};
const STATUS_STEPS = ['컨택완료','답변대기','진행확정','가이드발송','포스팅완료','발송대기','발송완료'];
const BL_REASONS = ['단가 상향 요청','미발행 (발행 약속 불이행)','읽씹 (읽고 무응답)','안읽씹 (미열람)','포스팅 품질 불량','기타'];
const CATEGORIES = ['IT/테크','마케팅','경제/재테크','일상/라이프','정보성','기타'];
const FEES = ['50,000','100,000','150,000','200,000'];

// ── 상태 ──────────────────────────────────────────
let _rows = [];
let _summary = [];
let _guides = [];
let _cycles = [];
let _curCycle = '';
let _editRow = null;
let _currentEditEmail = '';
let _loadToken = 0;

const F = {
  allPF:'all', allBL:'all',
  cycSF:'all', cycPF:new Set(['네이버 블로그','티스토리']),
  shipPF:new Set(['네이버 블로그','티스토리']),
  donePF:new Set(['네이버 블로그','티스토리']),
};

// ── 패널 전환 버그 방지 플래그 ──────────────────────
let _panelTransitioning = false;

// ── 초기화 ────────────────────────────────────────
window.onload = () => loadAll();

function _showLoader() {
  let el = document.getElementById('global-loader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'global-loader';
    el.style.cssText = [
      'position:fixed','inset:0','z-index:500',
      'background:rgba(15,23,42,.55)',
      'backdrop-filter:blur(3px)',
      'display:flex','flex-direction:column',
      'align-items:center','justify-content:center','gap:14px'
    ].join(';');
    el.innerHTML = `
      <div style="width:40px;height:40px;border:3px solid #334155;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;"></div>
      <div style="color:#94A3B8;font-size:13px;font-weight:500;">불러오는 중...</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
    document.body.appendChild(el);
  }
  el.style.display = 'flex';
}
function _hideLoader() {
  const el = document.getElementById('global-loader');
  if (el) el.style.display = 'none';
}

function loadAll() {
  _loadToken++;
  const token = _loadToken;
  _showLoader();

  Promise.all([
    apiGet('getAllRows'),
    apiGet('getGuides')
  ]).then(([rows, guides]) => {
    if (token !== _loadToken) return;
    _rows   = Array.isArray(rows)   ? rows.filter(r => r && r.email) : [];
    _guides = Array.isArray(guides) ? guides : [];
    _afterLoad();
  }).catch(err => {
    toast('데이터 로드 실패: ' + err, 'err');
  }).finally(() => {
    if (token === _loadToken) _hideLoader();
  });
}

function _afterLoad() {
  _summary  = _buildSummary(_rows);
  _cycles   = [...new Set(_rows.map(r => r.cycle).filter(Boolean))].sort().reverse();
  // 차수별 운영 탭: 오늘 날짜 기준 월에 맞는 차수 자동 선택
  _curCycle = _autoDetectCycle() || _cycles[0] || '';
  _buildCycleSels();
  renderDash();
  renderAll();
  renderCyc();
  renderShip();
  renderDone();
  renderBlack();
  renderGuide();
}

// 오늘 월 기준으로 차수 자동 감지
function _autoDetectCycle() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  // 차수 목록에서 현재 연도+월에 해당하는 항목 검색
  // 형식 예: "2026년 4차", "2026년 4월 4차" 등 다양한 형식 지원
  const monthStr = String(month);
  return _cycles.find(c => {
    const s = String(c);
    return s.includes(String(year)) && (
      s.includes(monthStr + '차') ||
      s.includes(monthStr + '월')
    );
  }) || null;
}

function _buildSummary(rows) {
  const map = {};
  rows.forEach(r => {
    if (!r.email) return;
    const k = r.email.toLowerCase();
    if (!map[k]) {
      map[k] = {
        email: r.email, nick: r.nick || '', platform: r.platform || '네이버 블로그',
        category: r.category || '', visitors: r.visitors || '',
        blogUrl: r.blogUrl || '', black: r.black || 'N',
        blackReason: r.blackReason || '', memo: r.memo || '',
        collabCount: 0, fees: [], latestCycle: '', latestStatus: '', rowIndex: r.rowIndex
      };
    }
    const inf = map[k];
    if (r.nick)     inf.nick       = r.nick;
    if (r.platform) inf.platform   = r.platform;
    if (r.blogUrl)  inf.blogUrl    = r.blogUrl;
    if (r.memo)     inf.memo       = r.memo;
    if (r.black === 'Y') { inf.black = 'Y'; inf.blackReason = r.blackReason || ''; }
    if (r.cycle && r.cycle.trim()) {
      inf.collabCount++;
      inf.latestCycle  = r.cycle;
      inf.latestStatus = r.status || '';
      const fee = Number(String(r.confirmFee || r.proposeFee || '0').replace(/[^0-9]/g,''));
      if (fee > 0) inf.fees.push(fee);
    }
  });
  return Object.values(map).map(inf => ({
    ...inf,
    avgFee: inf.fees.length ? Math.round(inf.fees.reduce((a,b)=>a+b,0)/inf.fees.length) : 0
  }));
}

function _buildCycleSels() {
  ['cyc-sel','ship-sel','done-sel'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const base = id==='cyc-sel' ? '' : '<option value="all">전체 차수</option>';
    sel.innerHTML = base + _cycles.map(c=>`<option value="${c}">${c}</option>`).join('');
    if (id==='cyc-sel') sel.value = _curCycle;
  });
}

function onCycleChange() {
  _curCycle = document.getElementById('cyc-sel').value;
  F.cycSF = 'all';
  document.querySelectorAll('#cyc-sf .f-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector('#cyc-sf .f-all').classList.add('on');

}

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');

}

function setFilter(key, val, el, grpId) {
  F[key] = val;
  document.querySelectorAll('#'+grpId+' .f-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if (key==='allPF'||key==='allBL') renderAll();

}
function togglePlatF(tab, val, el) {
  const set = F[tab+'PF'];
  if (set.has(val)) set.delete(val); else set.add(val);
  el.classList.toggle('on', set.has(val));
  if (tab==='cyc')  renderCyc();
  if (tab==='ship') renderShip();
  if (tab==='done') renderDone();
}

function sbadge(s) { return `<span class="badge ${STATUS_BADGE[s]||''}">${s}</span>`; }
function pbadge(p) {
  return p==='티스토리'
    ? '<span class="badge b-ts">티스토리</span>'
    : '<span class="badge b-nv">네이버</span>';
}
function feeStr(f) { return f ? Number(f).toLocaleString()+'원' : '—'; }
function rowsOf(email) { return _rows.filter(r=>r.email.toLowerCase()===email.toLowerCase()); }
function qsel(rowIndex, status) {
  return `<select class="qs" onchange="quickStatus(${rowIndex},this.value)" onclick="event.stopPropagation()">
    ${STATUSES.map(s=>`<option${s===status?' selected':''}>${s}</option>`).join('')}
  </select>`;
}

// ── 렌더: 대시보드 ────────────────────────────────
function renderDash() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;

  // 오늘 날짜 기준 차수 감지
  const dashCycle = _autoDetectCycle() || _curCycle;
  const cycleRows = _rows.filter(r => r.cycle === dashCycle);

  // 배너
  const tag = document.getElementById('dash-cycle-tag');
  const title = document.getElementById('dash-cycle-title');
  const sub = document.getElementById('dash-cycle-sub');
  if (tag)   tag.textContent   = dashCycle || `${year}년 ${month}차`;
  if (title) title.textContent = `${month}월 운영 현황`;

  // 마감일 계산 (차수 전체 마감: 가장 늦은 deadline)
  const deadlines = cycleRows.map(r => r.deadline).filter(Boolean).sort();
  const lastDeadline = deadlines[deadlines.length - 1] || '';
  if (sub) sub.textContent = lastDeadline
    ? `오늘 기준 자동 선택 · 차수 마감 ${lastDeadline}`
    : '오늘 기준 자동 선택';

  // 통계
  const total   = cycleRows.length;
  const active  = cycleRows.filter(r => ['진행확정','가이드발송','포스팅완료','발송대기','발송완료'].includes(r.status)).length;
  const postPending = cycleRows.filter(r => !r.postUrl && ['가이드발송','진행확정'].includes(r.status)).length;
  const shipPending = cycleRows.filter(r => r.sent === 'N' && ['포스팅완료','발송대기'].includes(r.status)).length;

  function setStatBox(id, v, label) {
    const el = document.getElementById(id);
    if (el) el.innerHTML = `<div class="dsv">${v}</div><div class="dsl">${label}</div>`;
  }
  setStatBox('dash-stat-total',  total,       '총 컨택');
  setStatBox('dash-stat-active', active,      '진행확정+');
  setStatBox('dash-stat-post',   postPending, '포스팅 대기');
  setStatBox('dash-stat-ship',   shipPending, '발송 대기');

  // 차수 없음 처리
  const emptyEl    = document.getElementById('dash-empty');
  const bannerEl   = document.getElementById('dash-banner');
  const cardsWrap  = document.getElementById('dash-cards-wrap');
  const emptyTitle = document.getElementById('dash-empty-title');

  if (!dashCycle || cycleRows.length === 0) {
    if (emptyEl)   emptyEl.style.display  = '';
    if (bannerEl)  bannerEl.style.display = 'none';
    if (cardsWrap) cardsWrap.style.display = 'none';
    if (emptyTitle) emptyTitle.textContent = `${year}년 ${month}차 데이터가 없습니다`;
    return;
  }
  if (emptyEl)   emptyEl.style.display   = 'none';
  if (bannerEl)  bannerEl.style.display  = '';
  if (cardsWrap) cardsWrap.style.display = '';

  const todayDate = new Date(); todayDate.setHours(0,0,0,0);

  // 전체 진행 현황 카드 (진행 바 + 키워드)
  const allCnt = document.getElementById('dash-all-cnt');
  const cards  = document.getElementById('dash-cards');
  if (allCnt) allCnt.textContent = cycleRows.length + '명';
  if (!cards) return;

  const sorted = [...cycleRows].sort((a,b) => {
    const order = {
      '발송대기':0,'포스팅완료':1,'가이드발송':2,
      '진행확정':3,'답변대기':4,'컨택완료':5,
      '발송완료':6,'거절':7,'블랙리스트':8
    };
    return (order[a.status]??9) - (order[b.status]??9);
  });

  cards.innerHTML = sorted.map(r => {
    const stepIdx  = STATUS_STEPS.indexOf(r.status);
    const isDone   = r.sent === 'Y';
    const dl       = r.deadline ? new Date(r.deadline) : null;
    if (dl) dl.setHours(0,0,0,0);
    const dlDiff   = dl ? Math.ceil((dl - todayDate) / 86400000) : null;
    const isUrgent = dlDiff !== null && dlDiff <= 3 && !isDone
      && !['포스팅완료','발송대기','발송완료'].includes(r.status);

    // 카드 테두리/불투명도
    const cardStyle = isDone
      ? 'opacity:.6;'
      : isUrgent
        ? 'border-color:#FCA5A5;border-width:2px;'
        : '';

    // 진행 바 세그먼트
    const progSegs = STATUS_STEPS.map((s,i) => {
      const bg = i < stepIdx
        ? 'background:var(--green)'
        : i === stepIdx
          ? isUrgent ? 'background:var(--red)' : 'background:var(--blue)'
          : 'background:var(--paper3)';
      return `<div style="flex:1;height:5px;border-radius:3px;${bg};transition:background .3s;"></div>`;
    }).join('');

    // 현재 단계 라벨
    const currentLabel = STATUS_STEPS[stepIdx] || r.status;
    const deadlineStr = dlDiff !== null
      ? dlDiff < 0
        ? `<span style="color:var(--red);font-weight:700;">마감 ${Math.abs(dlDiff)}일 지남</span>`
        : dlDiff === 0
          ? `<span style="color:var(--red);font-weight:700;">오늘 마감</span>`
          : dlDiff <= 3
            ? `<span style="color:var(--amber);font-weight:600;">D-${dlDiff}</span>`
            : `<span style="color:var(--ink4);">마감 ${r.deadline}</span>`
      : r.deadline
        ? `<span style="color:var(--ink4);">마감 ${r.deadline}</span>`
        : `<span style="color:var(--ink4);">마감 미설정</span>`;

    // 가이드 키워드
    const guide = _guides.find(g => g.id === r.guideId);
    let kwHtml = '';
    if (!r.guideId) {
      kwHtml = `<div style="padding:10px 14px;background:var(--amber-l);border-bottom:1px solid #FDE68A;">
        <div style="font-size:10px;font-weight:700;color:var(--amber);margin-bottom:3px;">⚠ 가이드 미배정</div>
        <div style="font-size:11px;color:var(--amber);">가이드 발송 전 확인하세요</div>
      </div>`;
    } else if (guide) {
      const mainKws = guide.m1 ? guide.m1.split(',').map(k=>k.trim()).filter(Boolean) : [];
      const subKws  = guide.m2 ? guide.m2.split(',').map(k=>k.trim()).filter(Boolean) : [];
      kwHtml = `<div style="padding:10px 14px;background:var(--paper2);border-bottom:1px solid var(--line);">
        <div style="font-size:10px;font-weight:700;color:var(--purple);margin-bottom:6px;">📋 ${guide.id}</div>
        ${mainKws.length ? `<div style="margin-bottom:5px;display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;">
          <span style="font-size:9px;font-weight:700;color:var(--ink4);background:var(--paper3);border-radius:3px;padding:1px 5px;flex-shrink:0;">메인</span>
          ${mainKws.map(k=>`<span style="display:inline-block;background:var(--purple-l);color:var(--purple);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:600;margin:1px 0;">${k}</span>`).join('')}
        </div>` : ''}
        ${subKws.length ? `<div style="display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;">
          <span style="font-size:9px;font-weight:700;color:var(--ink4);background:var(--paper3);border-radius:3px;padding:1px 5px;flex-shrink:0;">서브</span>
          ${subKws.map(k=>`<span style="display:inline-block;background:var(--paper3);color:var(--ink2);border-radius:4px;padding:2px 7px;font-size:10px;border:1px solid var(--line2);margin:1px 0;">${k}</span>`).join('')}
        </div>` : ''}
      </div>`;
    } else {
      kwHtml = `<div style="padding:10px 14px;background:var(--paper2);border-bottom:1px solid var(--line);">
        <div style="font-size:10px;font-weight:700;color:var(--purple);margin-bottom:3px;">📋 ${r.guideId}</div>
        <div style="font-size:11px;color:var(--ink4);">키워드 정보 없음</div>
      </div>`;
    }

    // 발송완료 상태 표시
    const footRight = isDone
      ? `<span style="color:var(--green);font-size:11px;font-weight:600;">✓ ${r.sentDate||''} 발송완료</span>`
      : `<button class="btn-sm" onclick="event.stopPropagation();openRowDetail(${r.rowIndex})" style="font-size:11px;">수정</button>`;

    return `<div onclick="openRowDetail(${r.rowIndex})" style="background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;${cardStyle}"
      onmouseover="this.style.boxShadow='0 6px 20px rgba(0,0,0,.1)';this.style.transform='translateY(-1px)'"
      onmouseout="this.style.boxShadow='';this.style.transform=''">

      <!-- 헤더 -->
      <div style="padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--line);${isUrgent&&!isDone?'background:var(--red-l);':isDone?'background:var(--purple-l);':''}">
        ${pbadge(r.platform||'네이버 블로그')}
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.nick}</div>
          <div style="font-size:11px;color:var(--ink3);margin-top:2px;">${r.category||''} ${r.visitors?'· 일방문 '+r.visitors:''}</div>
        </div>
        <div style="flex-shrink:0;">${sbadge(r.status)}</div>
      </div>

      <!-- 진행 바 -->
      <div style="padding:12px 14px;border-bottom:1px solid var(--line);">
        <div style="display:flex;gap:3px;margin-bottom:6px;">${progSegs}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:11px;font-weight:600;color:${isUrgent?'var(--red)':isDone?'var(--green)':'var(--blue)'};">
            ${isDone ? '✓ 완료' : '▶ ' + currentLabel}
          </span>
          <span style="font-size:11px;">${deadlineStr}</span>
        </div>
      </div>

      <!-- 키워드 -->
      ${kwHtml}

      <!-- 하단 -->
      <div style="padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);">${feeStr(r.confirmFee||r.proposeFee)}</span>
        ${footRight}
      </div>
    </div>`;
  }).join('');
}

// 인라인 URL 저장
function saveInlineUrl(rowIndex, url, inputEl) {
  url = url.trim();
  if (!url) return;
  inputEl.disabled = true;
  apiPost({ action: 'updateRow', rowIndex, data: { postUrl: url } })
    .then(() => {
      const row = _rows.find(r => r.rowIndex === rowIndex);
      if (row) row.postUrl = url;
      toast('포스팅 URL 저장됨', 'ok');
      renderDash();
    })
    .catch(e => {
      inputEl.disabled = false;
      toast('저장 오류: ' + e, 'err');
    });
}

function renderCyc() {

  });

  document.getElementById('cyc-stats').innerHTML = [
    {l:'총 컨택',    v:all.length},
    {l:'진행확정',   v:(sc['진행확정']||0)+(sc['가이드발송']||0)+(sc['포스팅완료']||0)+(sc['발송대기']||0)+(sc['발송완료']||0), cls:'v-green'},
    {l:'포스팅완료', v:sc['포스팅완료']||0},
    {l:'발송대기',   v:sc['발송대기']||0, cls:'v-amber'},
    {l:'발송완료',   v:sc['발송완료']||0},
    {l:'거절',       v:(sc['거절']||0)+(sc['블랙리스트']||0), cls:'v-red'},
  ].map(x=>`<div class="stat-card"><div class="stat-label">${x.l}</div><div class="stat-value ${x.cls||''}">${x.v}</div></div>`).join('');
  document.getElementById('cyc-cnt').textContent = `${rows.length}명 / 총 ${all.length}명`;
  const b = document.getElementById('cyc-body');
  if (!rows.length) { b.innerHTML=`<tr class="empty-row"><td colspan="9">해당 조건의 데이터가 없습니다.</td></tr>`; return; }

    const isbl = r.black==='Y';
    return `<tr class="${isbl?'bl-row':''}" onclick="openRowDetail(${r.rowIndex})">
      <td>${pbadge(r.platform||'네이버 블로그')}</td>

      <td onclick="event.stopPropagation()">${qsel(r.rowIndex,r.status)}</td>

}

// ── 렌더: 발송 필요 ───────────────────────────────
function renderShip() {
  const sc = document.getElementById('ship-sel')?.value||'all';
  const rows = _rows.filter(r => {
    if (r.sent!=='N') return false;
    if (!['포스팅완료','발송대기'].includes(r.status)) return false;
    if (!F.shipPF.has(r.platform||'네이버 블로그')) return false;
    if (sc!=='all' && r.cycle!==sc) return false;
    return true;
  });
  document.getElementById('ship-cnt').textContent = `${rows.length}건`;
  const b = document.getElementById('ship-body');
  if (!rows.length) { b.innerHTML=`<tr class="empty-row"><td colspan="9">발송 대기 건이 없습니다.</td></tr>`; return; }
  b.innerHTML = rows.map(r => `<tr onclick="openRowDetail(${r.rowIndex})">
    <td style="font-size:11px">${r.cycle}</td>
    <td>${pbadge(r.platform||'네이버 블로그')}</td>

}

      (i.memo||'').toLowerCase().includes(q)
    );

  const total = _summary.filter(i=>i.black==='Y').length;

// ── 빠른 상태 변경 ─────────────────────────────────
function quickStatus(rowIndex, val) {
  if (val === '가이드발송') { openGuideForm(rowIndex, val); return; }
  if (val === '포스팅완료') { openPostForm(rowIndex, val); return; }
  if (val === '발송대기')   { openShipReadyForm(rowIndex, val); return; }
  if (val === '블랙리스트') { openBLFromRow(rowIndex); return; }  // BL 사유 입력 필요

  const row = _rows.find(r => r.rowIndex === rowIndex);
  const prevStatus = row ? row.status : '';
  if (row) {
    row.status = val;
    if (val === '발송완료') { row.sent = 'Y'; row.sentDate = _today(); }
  }
  _summary = _buildSummary(_rows);
  renderCyc(); renderShip(); renderDone(); renderBlack(); renderAll();

  apiPost({ action: 'updateStatus', rowIndex, status: val, extra: null })
    .then(() => { toast('→ ' + val, 'ok'); loadAll(); })
    .catch(e => {
      toast('저장 오류: ' + e, 'err');
      if (row) row.status = prevStatus;
      _summary = _buildSummary(_rows);
      renderCyc();
    });
}

}

function saveRowDetailAll(rowIndex) {
  const data = {};
  const fields = {
    'rd-cycle': 'cycle', 'rd-status': 'status', 'rd-fee': 'proposeFee',
    'rd-guide': 'guideId', 'rd-gsent': 'guideSent', 'rd-deadline': 'deadline',
    'rd-purl': 'postUrl', 'rd-ptitle': 'postTitle',
    'rd-name': 'realName', 'rd-phone': 'phone', 'rd-cfee': 'confirmFee'
  };
  Object.entries(fields).forEach(([elId, key]) => {
    const el = document.getElementById(elId);
    if (el) data[key] = el.value || '';
  });

  const row = _rows.find(r => r.rowIndex === rowIndex);
  if (row) Object.assign(row, data);
  _summary = _buildSummary(_rows);
  renderDash(); renderCyc(); renderShip(); renderDone(); renderAll();
  closePanel();
  toast('저장 중...', '');

  apiPost({ action: 'updateRow', rowIndex, data })
    .then(() => { toast('수정 완료', 'ok'); loadAll(); })
    .catch(e => { toast('오류: ' + e, 'err'); loadAll(); });
}

    .then(() => { closePanel(); toast('가이드 발송 저장', 'ok'); loadAll(); })
    .catch(e => toast('오류: ' + e, 'err'));

function savePostForm(rowIndex, newStatus) {
  const postUrl   = document.getElementById('p-url').value.trim();

function loadInfPreview(val) {
  const area = document.getElementById('dup-area');
  const box  = document.getElementById('inf-prev-box');
  if (!area||!box) return;
  if (!val||!val.includes('@')&&val.length<4) { area.innerHTML=''; box.innerHTML=''; return; }
  const inf = _summary.find(i=>i.email.toLowerCase()===val.toLowerCase());
  if (!inf) { area.innerHTML=''; box.innerHTML=''; return; }
  area.innerHTML = inf.black==='Y'
    ? `<div class="info-box danger" style="margin-top:6px;font-size:12px">⚠ <strong>${inf.nick}</strong>은 블랙리스트입니다 — ${inf.blackReason||'사유 없음'}</div>`
    : '';
  const hist = rowsOf(inf.email);
  box.innerHTML = `<div class="info-box" style="margin-bottom:14px">
    <div class="inf-name">${pbadge(inf.platform)}<span>${inf.nick}</span>${inf.black==='Y'?'<span class="badge b-bl">블랙</span>':''}</div>
    <div class="info-grid">
      <div><span>카테고리</span>${inf.category||'—'}</div>
      <div><span>방문자수</span>${inf.visitors||'—'}</div>
      <div><span>총 협업</span><strong>${inf.collabCount}회</strong></div>
      <div><span>평균단가</span><strong>${inf.avgFee?inf.avgFee.toLocaleString()+'원':'—'}</strong></div>
    </div>
    ${hist.length?`<div style="margin-top:10px;font-size:11px;font-weight:600;color:var(--ink3)">최근 협업</div>
    ${hist.slice(-3).reverse().map(r=>`<div style="display:flex;gap:8px;align-items:center;margin-top:5px;font-size:11px">
      ${sbadge(r.status)}<span>${r.cycle}</span><span class="mono">${feeStr(r.proposeFee)}</span>
    </div>`).join('')}`:''}
    ${inf.memo?`<div class="memo-box" style="margin-top:8px;font-size:11px">${inf.memo}</div>`:''}
  </div>`;
  const nickEl=(document.getElementById('f-nick'));  if(nickEl&&!nickEl.value) nickEl.value=inf.nick;
  const visEl =(document.getElementById('f-vis'));   if(visEl&&!visEl.value)  visEl.value=inf.visitors||'';
  const urlEl =(document.getElementById('f-url'));   if(urlEl&&!urlEl.value)  urlEl.value=inf.blogUrl||'';
  const catEl =(document.getElementById('f-cat'));   if(catEl&&inf.category)  catEl.value=inf.category;
  const memoEl=(document.getElementById('f-memo')); if(memoEl&&!memoEl.value) memoEl.value=inf.memo||'';
  selectPlat(inf.platform||'네이버 블로그');
}

function selectPlat(val) {
  const platEl = document.getElementById('f-plat');
  const nvEl   = document.getElementById('pb-nv');
  const tsEl   = document.getElementById('pb-ts');
  if (platEl) platEl.value = val;
  if (nvEl)   nvEl.className = 'plat-btn' + (val === '네이버 블로그' ? ' nv' : '');
  if (tsEl)   tsEl.className = 'plat-btn' + (val === '티스토리' ? ' ts' : '');
}

function saveNewRow() {
  const email = (document.getElementById('f-email')||{}).value?.trim();
  const nick  = (document.getElementById('f-nick')||{}).value?.trim();
  if (!email||!nick) { toast('이메일과 닉네임은 필수입니다.','err'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  const data = {
    email, nick,
    platform: document.getElementById('f-plat').value,
    category: document.getElementById('f-cat').value,
    visitors: document.getElementById('f-vis').value,
    blogUrl:  document.getElementById('f-url').value,
    memo:     document.getElementById('f-memo').value,
    cycle:    document.getElementById('f-cycle').value,
    proposeFee: document.getElementById('f-fee').value,
    status:   document.getElementById('f-status').value,
    black: 'N', sent: 'N',
  };
  const tempRow = {
    rowIndex: -1, email: data.email, nick: data.nick,
    platform: data.platform||'네이버 블로그', category: data.category||'',
    visitors: data.visitors||'', blogUrl: data.blogUrl||'',
    black: 'N', blackReason: '', memo: data.memo||'',
    cycle: data.cycle||'', proposeFee: data.proposeFee||'',
    status: data.status||'컨택완료', guideId:'', guideSent:'', deadline:'',
    postUrl:'', postTitle:'', realName:'', phone:'',
    confirmFee:'', sent:'N', sentDate:'', regDate: _today()
  };
  _rows.push(tempRow);
  _summary = _buildSummary(_rows);
  renderAll(); renderCyc();
  closePanel();
  toast('저장 중...', '');

  apiPost({ action: 'addRow', data })
    .then(res => {
      btn.disabled=false; btn.textContent='저장';
      toast((res && res.message) ? res.message : '등록 완료', 'ok');
      loadAll();
    })
    .catch(e => {
      btn.disabled=false; btn.textContent='저장';
      _rows = _rows.filter(r => r.rowIndex !== -1);
      _summary = _buildSummary(_rows);
      renderAll(); renderCyc();
      toast('저장 오류: ' + e, 'err');
    });
}

// ── 렌더: 가이드 목록 ──────────────────────────────
function renderGuide() {
  const cnt  = document.getElementById('guide-cnt');
  const wrap = document.getElementById('guide-cards');
  const empty= document.getElementById('guide-empty');
  if (!wrap) return;

  if (cnt) cnt.textContent = `${_guides.length}개`;

  if (!_guides.length) {
    wrap.style.display  = 'none';
    if (empty) empty.style.display = '';
    return;
  }
  wrap.style.display  = 'flex';
  if (empty) empty.style.display = 'none';

  wrap.innerHTML = _guides.map(g => {
    const users    = _rows.filter(r => r.guideId === g.id);
    const mains    = g.m1 ? g.m1.split(',').map(k=>k.trim()).filter(Boolean) : [];
    const subs     = g.m2 ? g.m2.split(',').map(k=>k.trim()).filter(Boolean) : [];
    const statusCounts = {};
    users.forEach(r => { statusCounts[r.status] = (statusCounts[r.status]||0)+1; });

    const kwBadges = [
      ...mains.map(k=>`<span style="display:inline-block;background:var(--purple-l);color:var(--purple);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;margin:2px 2px 2px 0;">${k}</span>`),
      ...subs.map(k=>`<span style="display:inline-block;background:var(--paper3);color:var(--ink2);border-radius:4px;padding:2px 8px;font-size:11px;border:1px solid var(--line2);margin:2px 2px 2px 0;">${k}</span>`)
    ].join('');

    const userRows = users.map(r => `
      <div onclick="openRowDetail(${r.rowIndex})" style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;background:var(--paper2);border:1px solid var(--line);margin-bottom:5px;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='var(--blue-l)'" onmouseout="this.style.background='var(--paper2)'">
        ${pbadge(r.platform||'네이버 블로그')}
        <strong style="font-size:12px;flex:1;">${r.nick}</strong>
        ${sbadge(r.status)}
        <span style="font-size:11px;color:var(--ink3);">${r.cycle||'—'}</span>
        ${r.deadline?`<span style="font-size:10px;color:var(--amber);">마감 ${r.deadline}</span>`:''}
      </div>`).join('');

    const statusSummary = Object.entries(statusCounts)
      .map(([s,c])=>`<span style="font-size:10px;background:var(--paper3);border-radius:3px;padding:1px 6px;margin-right:3px;">${s} ${c}</span>`)
      .join('');

    return `
    <div style="background:var(--paper);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--sh);">
      <!-- 카드 헤더 (항상 표시) -->
      <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;"
           onclick="toggleGuideCard('gc-${g.id}', this)">
        <!-- 토글 화살표 -->
        <span id="gc-arrow-${g.id}" style="font-size:12px;color:var(--ink4);transition:transform .2s;display:inline-block;">▶</span>
        <!-- 가이드 ID -->
        <span style="font-size:14px;font-weight:700;color:var(--purple);min-width:60px;">${g.id}</span>
        <!-- 차수 -->
        <span style="font-size:11px;color:var(--ink3);min-width:80px;">${g.cycle||'—'}</span>
        <!-- 키워드 미리보기 -->
        <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--ink2);">
          ${mains.length ? mains.join(', ') : '<span style="color:var(--ink4);">키워드 없음</span>'}
          ${subs.length ? `<span style="color:var(--ink4);"> / ${subs.join(', ')}</span>` : ''}
        </div>
        <!-- 담당자 수 -->
        <span style="font-size:11px;font-weight:700;background:${users.length?'var(--blue-l)':'var(--paper3)'};color:${users.length?'var(--blue)':'var(--ink4)'};border-radius:20px;padding:2px 10px;white-space:nowrap;">${users.length}명</span>
        <!-- 노션 링크 -->
        ${g.link?`<a href="${g.link}" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;font-weight:600;color:var(--blue);white-space:nowrap;padding:4px 10px;border:1px solid var(--blue);border-radius:6px;" onmouseover="this.style.background='var(--blue-l)'" onmouseout="this.style.background=''">노션 →</a>`:''}
        <!-- 수정 버튼 -->
        <button class="btn-sm" onclick="event.stopPropagation();openGuideEditPanel('${g.id}')" style="white-space:nowrap;">수정</button>
      </div>

      <!-- 토글 확장 영역 -->
      <div id="gc-${g.id}" style="display:none;border-top:1px solid var(--line);">
        <!-- 키워드 상세 -->
        <div style="padding:12px 18px;background:var(--paper2);border-bottom:1px solid var(--line);">
          <div style="font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">키워드</div>
          <div>${kwBadges || '<span style="color:var(--ink4);font-size:12px;">등록된 키워드 없음</span>'}</div>
          ${g.m3?`<div style="margin-top:8px;font-size:11px;color:var(--ink3);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:7px 10px;">${g.m3}</div>`:''}
        </div>

        <!-- 담당 블로거 목록 -->
        <div style="padding:12px 18px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <span style="font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;">담당 블로거 (${users.length}명)</span>
            ${statusSummary}
          </div>
          ${users.length ? userRows : '<div style="color:var(--ink4);font-size:12px;padding:8px 0;">담당 블로거가 없습니다.</div>'}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleGuideCard(id, headerEl) {
  const panel = document.getElementById(id);
  const gId   = id.replace('gc-', '');
  const arrow = document.getElementById('gc-arrow-' + gId);
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : '';
  if (arrow) arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function openGuideDetail(id) {
  // 가이드 탭에서는 인라인 토글로 대체되었으나, 다른 탭에서 호출될 때를 위한 패널 뷰 유지
  const g = _guides.find(x => x.id === id);
  if (!g) return;
  const users = _rows.filter(r => r.guideId === id);
  const mains = g.m1 ? g.m1.split(',').map(k=>k.trim()).filter(Boolean) : [];
  const subs  = g.m2 ? g.m2.split(',').map(k=>k.trim()).filter(Boolean) : [];
  document.getElementById('sp-title').textContent = `가이드 ${id}`;
  document.getElementById('sp-body').innerHTML = `
    <div style="padding:16px 20px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <span style="font-size:18px;font-weight:700;color:var(--purple);">${g.id}</span>
        <span style="font-size:12px;color:var(--ink3);">${g.cycle||''}</span>
        ${g.link?`<a href="${g.link}" target="_blank" class="btn-p" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:5px 12px;text-decoration:none;margin-left:auto;">노션 열기 →</a>`:''}
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">메인 키워드</div>
      <div style="margin-bottom:12px;">${mains.map(k=>`<span style="display:inline-block;background:var(--purple-l);color:var(--purple);border-radius:4px;padding:3px 8px;font-size:11px;font-weight:600;margin:2px 2px 2px 0;">${k}</span>`).join('')||'—'}</div>
      <div style="font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">서브 키워드</div>
      <div style="margin-bottom:14px;">${subs.map(k=>`<span style="display:inline-block;background:var(--paper3);color:var(--ink2);border-radius:4px;padding:3px 8px;font-size:11px;border:1px solid var(--line2);margin:2px 2px 2px 0;">${k}</span>`).join('')||'—'}</div>
      ${g.m3?`<div style="font-size:12px;color:var(--ink2);background:var(--paper2);border:1px solid var(--line);border-radius:7px;padding:10px 12px;margin-bottom:14px;">${g.m3}</div>`:''}
      <hr class="divider">
      <div style="font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">담당 블로거 (${users.length}명)</div>
      ${users.length ? users.map(r=>`
        <div onclick="openRowDetail(${r.rowIndex})" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--paper2);border:1px solid var(--line);margin-bottom:5px;cursor:pointer;" onmouseover="this.style.background='var(--blue-l)'" onmouseout="this.style.background='var(--paper2)'">
          ${pbadge(r.platform||'네이버 블로그')}
          <strong style="font-size:12px;flex:1;">${r.nick}</strong>
          ${sbadge(r.status)}
          <span style="font-size:11px;color:var(--ink3);">${r.cycle}</span>
          ${r.deadline?`<span style="font-size:10px;color:var(--amber);">마감 ${r.deadline}</span>`:''}
        </div>`).join('')
      : '<div style="color:var(--ink4);font-size:12px;padding:8px 0;">담당 블로거가 없습니다.</div>'}
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn-s" onclick="closePanel()">닫기</button>
        <button class="btn-p" onclick="closePanel();setTimeout(()=>openGuideEditPanel('${id}'),50)">수정</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function openGuideAddPanel() {
  document.getElementById('sp-title').textContent = '가이드 등록';
  document.getElementById('sp-body').innerHTML = buildGuideForm(null);
  document.getElementById('overlay').classList.add('open');
}

function openGuideEditPanel(id) {
  const g = _guides.find(x => x.id === id);
  document.getElementById('sp-title').textContent = `가이드 ${id} 수정`;
  document.getElementById('sp-body').innerHTML = buildGuideForm(g);
  document.getElementById('overlay').classList.add('open');
}

function buildGuideForm(g) {
  return `<div style="padding:20px;">
    <div class="fg"><label class="fl">차수</label>
      <input class="fc" id="gf-cycle" value="${g?g.cycle:_curCycle||''}" placeholder="예: 2025년 7차">
    </div>
    <div class="fg"><label class="fl">노션 링크</label>
      <input class="fc" id="gf-link" value="${g?g.link||'':''}" placeholder="https://notion.so/...">
    </div>
    <div class="fg"><label class="fl">메인 키워드 <span class="req">*</span></label>
      <input class="fc" id="gf-m1" value="${g?g.m1||'':''}" placeholder="예: 경리나라 무료체험">
    </div>
    <div class="fg"><label class="fl">서브 키워드</label>
      <input class="fc" id="gf-m2" value="${g?g.m2||'':''}" placeholder="예: 경리회계프로그램, 경리나라 가격">
    </div>
    <div class="fg"><label class="fl">기타 메모</label>
      <textarea class="fc" id="gf-m3" style="min-height:60px">${g?g.m3||'':''}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn-s" onclick="closePanel()">취소</button>
      <button class="btn-p" id="gf-save" onclick="saveGuide('${g?g.id:''}')">저장</button>
    </div>`;
}

function saveGuide(existingId) {
  const m1 = (document.getElementById('gf-m1')||{}).value?.trim();
  if (!m1) { toast('메인 키워드는 필수입니다.','err'); return; }
  const btn = document.getElementById('gf-save');
  btn.disabled=true; btn.textContent='저장 중...';
  const data = {
    cycle: document.getElementById('gf-cycle').value||'',
    link:  document.getElementById('gf-link').value||'',
    m1,
    m2: document.getElementById('gf-m2').value||'',
    m3: document.getElementById('gf-m3').value||'',
    memo: ''
  };
  // 기존 가이드 수정 시 updateGuide, 신규 등록 시 addGuide
  const action = existingId ? 'updateGuide' : 'addGuide';
  if (existingId) data.id = existingId;
  apiPost({ action, data })
    .then(res => {
      btn.disabled=false; btn.textContent='저장';
      closePanel();
      toast((res&&res.message)||(existingId?'가이드 수정 완료':'가이드 등록 완료'), 'ok');
      loadAll();
    })
    .catch(e => {
      btn.disabled=false; btn.textContent='저장';
      toast('오류: ' + e, 'err');
    });
}

// ── CSV 내보내기 ───────────────────────────────────
function exportShipCSV() {
  const sc  = document.getElementById('ship-sel')?.value||'all';
  const rows = _rows.filter(r => {
    if (r.sent!=='N') return false;
    if (!['포스팅완료','발송대기'].includes(r.status)) return false;
    if (sc!=='all' && r.cycle!==sc) return false;
    return true;
  });
  if (!rows.length) { toast('내보낼 데이터가 없습니다.','err'); return; }
  const header = ['차수','닉네임','실명','연락처','확정금액','포스팅URL'];
  const lines  = [header.join(',')];
  rows.forEach(r => {
    lines.push([r.cycle,r.nick,r.realName||'',r.phone||'',r.confirmFee||r.proposeFee||'',r.postUrl||''].map(v=>`"${v}"`).join(','));
  });
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`발송요청서_${sc==='all'?'전체':sc}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('발송요청서 다운로드 완료','ok');
}

// ── 오버레이 ───────────────────────────────────────
function closeIfOut(e) {
  if (_panelTransitioning) return;
  if (!document.getElementById('sp').contains(e.target)) closePanel();
}
function closePanel() { document.getElementById('overlay').classList.remove('open'); }

// ── 토스트 ─────────────────────────────────────────
function toast(msg, type='') {
  const c = document.getElementById('tc');
  const t = document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  c.appendChild(t); setTimeout(()=>t.remove(),3000);
}

// ── 유틸 ───────────────────────────────────────────
function _today() {
  const d=new Date(); return d.toISOString().split('T')[0];
}
</script>
